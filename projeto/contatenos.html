<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
<meta name="author" content="Daniel Schons Castro,Thomas uriel dos Santos Soares: softec">
    <meta name="description" content="contate nos para saber mais informaçoes e agendar sua viagem">
    <meta name="keywords" content="pacotes, serviços, ofertas, viagens, produtos">

  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/contato.css">
</head>

<body>

<div id="header"></div>

<section class="hero">

  <div class="overlay"></div>

  <div class="content">

    <form class="left" method="GET" action="contataremosembreve.html"> <!--  subistituir por recievedata.php  -->
  <p>Gostaríamos muito de ouvir de você!</p>
  <h1>Contate-nos</h1>

  <div class="grid">
    <div class="form-group">
      <label for="email">Email *</label>
      <input 
        type="email" 
        id="email"
        name="email" 
        placeholder="Digite seu email"
        required
      >
    </div>
    
    <div class="form-group">
      <label for="name">Nome *</label>
      <input 
        type="text" 
        id="name"
        name="name" 
        placeholder="Seu nome"
        required
      >
    </div>
    
    <div class="form-group">
      <label for="address">Endereço</label>
      <input 
        type="text" 
        id="address"
        name="address" 
        placeholder="Seu endereço"
      >
    </div>
    
    <div class="form-group">
      <label for="phone">Telefone</label>
      <input 
        type="tel" 
        id="phone"
        name="phone" 
        placeholder="Seu telefone"
      >
    </div>
  </div>

  <div class="form-group">
    <label for="message">Mensagem *</label>
    <textarea 
      id="message"
      name="message" 
      placeholder="Digite sua mensagem"
      required
    ></textarea>
  </div>

  <button type="submit">ENVIAR</button>
</form>

    <aside  class="right">
      <div class="card">
        <h3>📞 LIGUE PARA NÓS</h3>
        <p>1 (234) 567-891</p>

        <h3>📍 LOCALIZAÇÃO</h3>
        <p>Porto Alegre,RS</p>

        <h3>⏰ HORÁRIO</h3>
        <p>Seg – Sex: 10h – 20h</p>
      </div>
    </div>

  </aside >

</section>

<script>
fetch("header.txt")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;





  })
  
const urlParams = new URLSearchParams(window.location.search);
const nomePacote = urlParams.get('pacote');
  
if (nomePacote != null){

document.getElementById("message").textContent = "eu estou interessado no pacote "+nomePacote
}
  ;
</script>

</body>
</html>
